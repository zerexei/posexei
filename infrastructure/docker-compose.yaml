name: posexei

networks:
  app:

volumes:
  identity-db-data:
  social-post-db-data:
  social-account-db-data:
  social-publish-db-data:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:

services:

  # =========================
  # Traefik reverse proxy
  # src: https://doc.traefik.io/traefik/getting-started/docker
  # =========================
  traefik:
    image: traefik:v3.6.8
    container_name: traefik
    restart: unless-stopped
    networks:
      - app
    command:
      - "--configFile=/etc/traefik/traefik.yml"

    ports:
      - "80:80"
      # - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik/traefik.yaml:/etc/traefik/traefik.yml
      # - "../certs:/certs:ro"
      # - "./traefik/dynamic:/etc/traefik/dynamic:ro"
      # labels:
      #   - "traefik.enable=true"
      #   - "traefik.http.routers.dashboard.rule=Host(`dashboard.docker.localhost`)"
      #   - "traefik.http.routers.dashboard.entrypoints=websecure"
      #   - "traefik.http.routers.dashboard.service=api@internal"
      #   - "traefik.http.routers.dashboard.tls=true"

      # =========================
      # 🌐 FRONTEND
      # =========================
  client:
    build: ../apps/client
    depends_on:
      - traefik
      - gateway
    volumes:
      - ../apps/client:/app
      - /app/node_modules
    networks:
      - app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`app.localhost`)"
      - "traefik.http.routers.app.entrypoints=web"
      # - "traefik.http.routers.app.entrypoints=websecure"
      # - "traefik.http.routers.app.tls=true"
      - "traefik.http.services.app.loadbalancer.server.port=3000"

  # =========================
  # 🚪 GATEWAY
  # =========================
  gateway:
    build:
      context: ..
      dockerfile: gateway/app/Dockerfile
    depends_on:
      - traefik
      - identity-service
      - social-account-service
      - social-post-service
      - social-publish-service
    networks:
      - app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=Host(`gateway.localhost`)"
      - "traefik.http.routers.gateway.entrypoints=web"
      - "traefik.http.services.gateway.loadbalancer.server.port=3001"
      - "traefik.http.routers.gateway.middlewares=gateway-cors"
      - "traefik.http.middlewares.gateway-cors.headers.accesscontrolalloworigin\
        list=http://app.localhost"
      - "traefik.http.middlewares.gateway-cors.headers.accesscontrolallowmethod\
        s=GET,OPTIONS,PUT,POST,DELETE"
      - "traefik.http.middlewares.gateway-cors.headers.accesscontrolallowheader\
        s=*"
      - "traefik.http.middlewares.gateway-cors.headers.accesscontrolallowcreden\
        tials=true"
      - "logging=promtail"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=gateway

  # =========================
  # 🔐 Identity Service
  # =========================
  identity-service:
    build:
      context: ..
      dockerfile: services/identity-service/Dockerfile
    env_file:
      - ../services/identity-service/.env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=identity-service
    labels:
      - "logging=promtail"
    depends_on:
      - identity-db
    networks:
      - app

  identity-worker:
    build:
      context: ..
      dockerfile: services/identity-service/Dockerfile
    env_file:
      - ../services/identity-service/.env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=identity-worker
    labels:
      - "logging=promtail"
    depends_on:
      - identity-db
      - redis
      - otel-collector
    command: ["uv", "run", "python", "worker.py"]
    networks:
      - app

  identity-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: identity_user
      POSTGRES_PASSWORD: identity_pass
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    networks:
      - app

  # =========================
  # Social Post Service
  # =========================
  social-post-service:
    build:
      context: ..
      dockerfile: services/social-post-service/Dockerfile
    environment:
      - DATABASE_URL=postgresql://social_post_user:social_post_pass@social-post-db:5432/social_post_db
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=social-post-service
    labels:
      - "logging=promtail"
    depends_on:
      - social-post-db
    networks:
      - app

  social-post-worker:
    build:
      context: ..
      dockerfile: services/social-post-service/Dockerfile
    environment:
      - DATABASE_URL=postgresql://social_post_user:social_post_pass@social-post-db:5432/social_post_db
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=social-post-worker
    labels:
      - "logging=promtail"
    depends_on:
      - social-post-db
      - redis
      - otel-collector
    command: ["uv", "run", "python", "worker.py"]
    networks:
      - app

  social-post-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: social_post_db
      POSTGRES_USER: social_post_user
      POSTGRES_PASSWORD: social_post_pass
    volumes:
      - social-post-db-data:/var/lib/postgresql/data
    networks:
      - app

  # =========================
  # Social Account Service
  # =========================
  social-account-service:
    build:
      context: ..
      dockerfile: services/social-account-service/Dockerfile
    environment:
      - DATABASE_URL=postgresql://social_account_user:social_account_pass@social-account-db:5432/social_account_db
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=social-account-service
    labels:
      - "logging=promtail"
    depends_on:
      - social-account-db
    networks:
      - app

  social-account-worker:
    build:
      context: ..
      dockerfile: services/social-account-service/Dockerfile
    environment:
      - DATABASE_URL=postgresql://social_account_user:social_account_pass@social-account-db:5432/social_account_db
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=social-account-worker
    labels:
      - "logging=promtail"
    depends_on:
      - social-account-db
      - redis
      - otel-collector
    command: ["uv", "run", "python", "worker.py"]
    networks:
      - app

  social-account-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: social_account_db
      POSTGRES_USER: social_account_user
      POSTGRES_PASSWORD: social_account_pass
    volumes:
      - social-account-db-data:/var/lib/postgresql/data
    networks:
      - app

  # =========================
  # Social Publish Service
  # =========================
  social-publish-service:
    build:
      context: ..
      dockerfile: services/social-publish-service/Dockerfile
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=social-publish-service
    labels:
      - "logging=promtail"
    depends_on:
      - redis
    networks:
      - app

  social-publish-worker:
    build:
      context: ..
      dockerfile: services/social-publish-service/Dockerfile
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=social-publish-worker
    labels:
      - "logging=promtail"
    depends_on:
      - redis
      - otel-collector
    command: ["uv", "run", "python", "worker.py"]
    networks:
      - app

  # =========================
  # Redis Server
  # =========================
  redis:
    image: redis:8.6.0-alpine3.23
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app
    restart: always

  # =========================
  # 📊 OBSERVABILITY
  # =========================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    networks:
      - app
    depends_on:
      - prometheus
      - loki
      - tempo

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - app

  grafana:
    image: grafana/grafana:10.4.1
    container_name: grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    networks:
      - app
    ports:
      - "3000:3000"

  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    networks:
      - app

  tempo:
    image: grafana/tempo:2.4.0
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo-config.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    networks:
      - app

  promtail:
    image: grafana/promtail:2.9.4
    container_name: promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./observability/promtail-config.yaml:/etc/promtail/config.yml
    networks:
      - app

