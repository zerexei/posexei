global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # OTel Collector internal metrics
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  # OTel Collector Prometheus exporter (posexei app metrics)
  - job_name: posexei-otel-metrics
    static_configs:
      - targets: ["otel-collector:8889"]

  # Per-service /metrics endpoints (prometheus-fastapi-instrumentator)
  - job_name: gateway
    static_configs:
      - targets: ["gateway:3001"]
    metrics_path: /metrics

  - job_name: identity-service
    static_configs:
      - targets: ["identity-service:3001"]
    metrics_path: /metrics

  - job_name: social-account-service
    static_configs:
      - targets: ["social-account-service:3001"]
    metrics_path: /metrics

  - job_name: social-post-service
    static_configs:
      - targets: ["social-post-service:3001"]
    metrics_path: /metrics

  - job_name: social-publish-service
    static_configs:
      - targets: ["social-publish-service:3001"]
    metrics_path: /metrics
