apiVersion: v1
kind: ServiceAccount
metadata:
  name: posexei-app
  namespace: posexei
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: posexei-app-role
  namespace: posexei
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: posexei-app-rolebinding
  namespace: posexei
subjects:
  - kind: ServiceAccount
    name: posexei-app
    namespace: posexei
roleRef:
  kind: Role
  name: posexei-app-role
  apiGroups: rbac.authorization.k8s.io
