alertmanager:
  enabled: true
  persistence:
    size: 2Gi

prometheus-pushgateway:
  enabled: false

server:
  persistentVolume:
    size: 8Gi
  global:
    scrape_interval: 15s

extraScrapeConfigs: |
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector.posexei.svc.cluster.local:8889']
