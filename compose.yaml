services:
    # =========================
    # App - https://laravel.com
    # =========================
    laravel.test:
        build:
            context: './vendor/laravel/sail/runtimes/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - pgsql
            - redis
        labels:
            - 'traefik.enable=true'
            - 'traefik.http.routers.app.rule=Host(`app.localhost`)'
            - 'traefik.http.services.app.loadbalancer.server.port=80'
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    # =========================
    # Traefik reverse proxy
    # src: https://doc.traefik.io/traefik/getting-started/docker
    # =========================
    traefik:
        image: traefik:v3.6
        command:
            - '--api.insecure=true'
            - "--api.dashboard=true"
            - '--providers.docker=true'
            - '--entrypoints.web.address=:80'
        ports:
            - '80:80'
            - '8080:8080' # Traefik dashboard
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        networks:
            - sail
        restart: always
        healthcheck:
            test: ["CMD", "traefik", "healthcheck"]
            interval: 10s
            timeout: 5s
            retries: 3

    # =========================
    # PostgreSQL database
    # =========================
    pgsql:
        image: 'postgres:18-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql'
            - './vendor/laravel/sail/database/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 3
            timeout: 5s
    # =========================
    # Redis
    # =========================
    redis:
        image: redis:8.6.0-alpine3.23
        container_name: redis
        ports:
            - "6379:6379"
        networks:
            - sail
        restart: unless-stopped

    # =========================
    # pgAdmin database management tool
    # src: https://www.pgadmin.org/docs/pgadmin4/latest/container_deployment.html
    # =========================
    pgadmin:
        image: dpage/pgadmin4:9.12.0
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@example.com
            PGADMIN_DEFAULT_PASSWORD: admin
        depends_on:
            - pgsql
        networks:
            - sail
        volumes:
            - sail-pgadmin:/var/lib/pgadmin
        labels:
            - 'traefik.enable=true'
            - 'traefik.http.routers.pgadmin.rule=Host(`pgadmin.localhost`)'
            - 'traefik.http.services.pgadmin.loadbalancer.server.port=80'
    ngrok:
        image: ngrok/ngrok:latest
        command: http --url=${NGROK_URL} laravel.test:80
        environment:
            NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
        networks:
            - sail
        depends_on:
            - laravel.test
            - traefik
        ports:
            - '4040:4040'
    # =========================
    # MinIO (S3 Storage)
    # =========================
    minio:
      image: minio/minio:latest
      container_name: minio
      command: server /data --console-address ":9001"
      environment:
        MINIO_ROOT_USER: ${MINIO_USER}
        MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
      ports:
        - "9000:9000"
        - "9001:9001"
      volumes:
        - minio_data:/data
      networks:
        - sail
      restart: unless-stopped
      labels:
        - "traefik.http.routers.minio-console.rule=Host(`minio.localhost`)"
        - "traefik.http.routers.minio-console.entrypoints=web"
        - "traefik.http.services.minio-console.loadbalancer.server.port=9091"

    # =========================
    # Grafana - Visualizations
    # =========================
    grafana:
        image: grafana/grafana:latest
        container_name: grafana
        environment:
            - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
            - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
        volumes:
            - './grafana/provisioning:/etc/grafana/provisioning'
            - './grafana/dashboards:/var/lib/grafana/dashboards'
            - 'sail-grafana:/var/lib/grafana'
        depends_on:
            - prometheus
            - loki
            - tempo
        networks:
            - sail
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.grafana.rule=Host(`grafana.localhost`)"
            - "traefik.http.routers.grafana.entrypoints=web"
            - "traefik.http.services.grafana.loadbalancer.server.port=3000"

    # =========================
    # Prometheus - Metrics Storage
    # =========================
    prometheus:
        image: prom/prometheus:latest
        container_name: prometheus
        command:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--web.console.libraries=/etc/prometheus/console_libraries'
            - '--web.console.templates=/etc/prometheus/consoles'
            - '--web.enable-lifecycle'
        volumes:
            - './observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro'
            - './observability/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro'
            - 'sail-prometheus:/prometheus'
        networks:
            - sail
        depends_on:
            - opentelemetry-collector
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.prometheus.rule=Host(`prometheus.localhost`)"
            - "traefik.http.routers.prometheus.entrypoints=web"
            - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

    # =========================
    # Alertmanager - Alerting
    # =========================
    alertmanager:
        image: prom/alertmanager:latest
        container_name: alertmanager
        volumes:
            - './observability/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro'
        networks:
            - sail
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.alertmanager.rule=Host(`alertmanager.localhost`)"
            - "traefik.http.routers.alertmanager.entrypoints=web"
            - "traefik.http.services.alertmanager.loadbalancer.server.port=9093"

    # =========================
    # Loki - Logs Storage
    # =========================
    loki:
        image: grafana/loki:latest
        container_name: loki
        command: -config.file=/etc/loki/local-config.yml
        volumes:
            - './observability/loki/loki-config.yml:/etc/loki/local-config.yml:ro'
            - 'sail-loki:/loki'
        ports:
            - "3100:3100"
        networks:
            - sail
        depends_on:
            - minio

    # =========================
    # Promtail - Log Collector
    # =========================
    promtail:
        image: grafana/promtail:latest
        container_name: promtail
        volumes:
            - './observability/promtail/promtail.yml:/etc/promtail/config.yml:ro'
            - '/var/lib/docker/containers:/var/lib/docker/containers:ro'
            - '/var/run/docker.sock:/var/run/docker.sock:ro'
        command: -config.file=/etc/promtail/config.yml
        networks:
            - sail
        depends_on:
            - loki

    # =========================
    # Tempo - Traces Storage
    # =========================
    tempo:
        image: grafana/tempo:latest
        container_name: tempo
        command: [ "-config.file=/etc/tempo.yaml" ]
        volumes:
            - './observability/tempo/tempo-config.yml:/etc/tempo.yaml:ro'
            - 'sail-tempo:/var/tempo'
        networks:
            - sail
        depends_on:
            - minio

    # =========================
    # OpenTelemetry Collector
    # =========================
    opentelemetry-collector:
        image: otel/opentelemetry-collector-contrib:latest
        container_name: otel-collector
        command: ["--config=/etc/otel-collector-config.yaml"]
        volumes:
            - './observability/opentelemetry/otel-collector-config.yml:/etc/otel-collector-config.yaml:ro'
        networks:
            - sail
        depends_on:
            - loki
            - tempo

    # =========================
    # Exporters
    # =========================
    node-exporter:
        image: prom/node-exporter:latest
        container_name: node-exporter
        restart: unless-stopped
        volumes:
            - /proc:/host/proc:ro
            - /sys:/host/sys:ro
            - /:/rootfs:ro
        command:
            - '--path.procfs=/host/proc'
            - '--path.sysfs=/host/sys'
            - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
        networks:
            - sail

    postgres-exporter:
        image: bitnami/postgres-exporter:latest
        container_name: postgres-exporter
        environment:
            - DATA_SOURCE_NAME=postgresql://${DB_USERNAME}:${DB_PASSWORD}@pgsql:5432/${DB_DATABASE}?sslmode=disable
        networks:
            - sail
        depends_on:
            - pgsql

    redis-exporter:
        image: bitnami/redis-exporter:latest
        container_name: redis-exporter
        environment:
            - REDIS_ADDR=redis:6379
        networks:
            - sail
        depends_on:
            - redis

    cadvisor:
        image: gcr.io/cadvisor/cadvisor:latest
        container_name: cadvisor
        volumes:
            - /:/rootfs:ro
            - /var/run:/var/run:ro
            - /sys:/sys:ro
            - /var/lib/docker/:/var/lib/docker:ro
            - /dev/disk/:/dev/disk:ro
        devices:
            - /dev/kmsg
        privileged: true
        networks:
            - sail

networks:
    sail:
        driver: bridge

volumes:
    sail-pgsql:
        driver: local
    sail-pgadmin:
        driver: local
    sail-redis:
        driver: local
    sail-grafana:
        driver: local
    sail-prometheus:
        driver: local
    sail-loki:
        driver: local
    sail-tempo:
        driver: local
    minio_data:
        driver: local
